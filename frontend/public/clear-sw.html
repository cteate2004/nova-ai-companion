<!DOCTYPE html>
<html>
<head><meta name="viewport" content="width=device-width,initial-scale=1"></head>
<body style="background:#1a1a2e;color:#e0d0ff;font-family:system-ui;padding:40px;text-align:center">
<h1>Clearing Nova cache...</h1>
<p id="status">Working...</p>
<script>
(async function() {
  const el = document.getElementById('status');
  try {
    // Unregister all service workers
    const regs = await navigator.serviceWorker.getRegistrations();
    for (const reg of regs) {
      await reg.unregister();
    }
    el.innerText = 'Unregistered ' + regs.length + ' service worker(s). ';

    // Clear all caches
    const keys = await caches.keys();
    for (const key of keys) {
      await caches.delete(key);
    }
    el.innerText += 'Cleared ' + keys.length + ' cache(s). Redirecting...';

    // Clear localStorage too just in case
    // (don't clear nova_token though)

    setTimeout(function() {
      window.location.href = '/';
    }, 2000);
  } catch(e) {
    el.innerText = 'Error: ' + e.message + '. Try clearing Safari data manually.';
  }
})();
</script>
</body>
</html>
